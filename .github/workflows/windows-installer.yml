name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  windows-installer:
    runs-on: windows-latest

    env:
      NODE_RUNTIME_VERSION: "22.12.0"
      PYTHON_RUNTIME_VERSION: "3.12.8"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for build
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next standalone app
        run: npm run build

      - name: Stage Windows app directory
        run: npm run package:win

      - name: Download bundled Node.js runtime
        shell: pwsh
        run: |
          $version = $env:NODE_RUNTIME_VERSION
          $zip = "node-v$version-win-x64.zip"
          $url = "https://nodejs.org/dist/v$version/$zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive $zip -DestinationPath runtime-node
          New-Item -ItemType Directory -Force -Path dist/windows/ppt-agent/runtime/node | Out-Null
          Copy-Item "runtime-node/node-v$version-win-x64/*" dist/windows/ppt-agent/runtime/node -Recurse -Force

      - name: Download bundled Python runtime
        shell: pwsh
        run: |
          $version = $env:PYTHON_RUNTIME_VERSION
          $zip = "python-$version-embed-amd64.zip"
          $url = "https://www.python.org/ftp/python/$version/$zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          New-Item -ItemType Directory -Force -Path dist/windows/ppt-agent/runtime/python | Out-Null
          Expand-Archive $zip -DestinationPath dist/windows/ppt-agent/runtime/python

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\ppt-agent.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ppt-agent-windows-installer
          path: dist/windows-installer/ppt-agent-setup.exe

      - name: Create GitHub release for tags
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windows-installer/ppt-agent-setup.exe
